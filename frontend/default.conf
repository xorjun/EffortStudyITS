server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text responses. nginx ships with the gzip module; this
    # drops the wire size of the Angular bundle by ~70% (vendor.js goes
    # from 5.4 MB to ~1.6 MB on the wire).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # index.html must always be re-validated so a new deploy is picked
    # up on the next navigation. The browser still reuses the cached
    # copy while it is fresh.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # Hashed bundle assets (Angular CLI emits main.<hash>.js etc.)
    # are content-addressed. A long-lived immutable cache lets the
    # browser reuse them across deployments and visits; a redeploy
    # ships new hashes and the browser picks up the new files
    # automatically.
    location ~* \.([a-f0-9]{16,})\.(js|css|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        expires 1y;
        access_log off;
    }

    # Un-hashed assets (runtime.js, polyfills.js, styles.css) get a
    # short cache so a re-deploy is picked up within an hour.
    location ~* \.(js|css|woff2?)$ {
        add_header Cache-Control "public, max-age=3600" always;
        expires 1h;
    }

    # Long-cache favicon and other static assets.
    location ~* \.(ico|png|svg|jpg|jpeg|gif)$ {
        add_header Cache-Control "public, max-age=604800" always;
        expires 7d;
        access_log off;
    }

    # API requests → FastAPI backend
    location /api/ {
        proxy_pass http://fastapi-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — all other routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
