<mat-toolbar class="navbar">
  <button mat-button class="nav-brand" (click)="emitHomeButtonClicked()" matTooltip="Return to the course selection screen" matTooltipPosition="below">
    <mat-icon>home</mat-icon>
    <span class="brand-text">{{title}}</span>
  </button>

  <span class="spacer"></span>

  <nav class="nav-links">
    <ng-container *ngIf="display_elements.has('topicSelection')">
      <button mat-button [matMenuTriggerFor]="topicMenu" matTooltip="Jump to another topic in this course" matTooltipPosition="below">
        {{current_topic_index}}/{{course_topics.length}} {{current_topic}}
      </button>
      <mat-menu #topicMenu="matMenu">
        <button mat-menu-item *ngFor="let topic of course_topics; index as i" (click)="topicSelected(topic)">
          {{i+1}}. {{topic}}
        </button>
      </mat-menu>
    </ng-container>

    <span class="vspace" *ngIf="display_elements.has('topicSelection')"></span>

    <ng-container *ngIf="display_elements.has('taskSelection')">
      <button mat-icon-button (click)="newTaskButtonClicked('previous')" matTooltip="Previous task" matTooltipPosition="below">
        <mat-icon>chevron_left</mat-icon>
      </button>
      <div class="task-nav-wrapper">
        <span class="task-name" [matTooltip]="task_name" matTooltipPosition="below">{{task_name}}</span>
        <div class="task-status-bubbles" *ngIf="visibleBubbles.length > 0">
          <span class="ellipsis" *ngIf="showLeftEllipsis">...</span>
          <span
            *ngFor="let task of visibleBubbles"
            class="task-bubble"
            [class.not-attempted]="task_status_dict[task] === 'not attempted'"
            [class.attempted]="task_status_dict[task] === 'attempted'"
            [class.completed]="task_status_dict[task] === 'completed'"
            [class.current]="task === task_name"
            [matTooltip]="task + ' — ' + (task_status_dict[task] || 'unknown status')"
            matTooltipPosition="below"
            (click)="onBubbleClick(task)">
          </span>
          <span class="ellipsis" *ngIf="showRightEllipsis">...</span>
        </div>
      </div>
      <button mat-icon-button
              *ngIf="isNextTaskUnlocked()"
              (click)="newTaskButtonClicked('next')"
              [matTooltip]="nextTaskTooltip()"
              matTooltipPosition="below"
              data-testid="next-task-button">
        <mat-icon>chevron_right</mat-icon>
      </button>
    </ng-container>

    <span class="vspace" *ngIf="display_elements.has('taskSelection')"></span>

    <ng-container *ngIf="roles.includes('admin') || roles.includes('tutor')">
      <button mat-button [matMenuTriggerFor]="settingsMenu" matTooltip="Open platform or course settings" matTooltipPosition="below">
        Settings
      </button>
      <mat-menu #settingsMenu="matMenu">
        <button mat-menu-item *ngIf="roles.includes('admin')" (click)="emitAdminSettingsRequested()">
          <mat-icon>admin_panel_settings</mat-icon>
          Admin Settings
        </button>
        <button mat-menu-item *ngIf="display_elements.has('courseSettings')" (click)="emitCourseSettingsRequested()">
          <mat-icon>settings</mat-icon>
          Course Settings
        </button>
      </mat-menu>
    </ng-container>

    <span class="vspace" *ngIf="roles.includes('admin') || roles.includes('tutor')"></span>

    <button mat-icon-button (click)="openHelp()" matTooltip="Open the platform help guide" matTooltipPosition="below" aria-label="Open help">
      <mat-icon>help_outline</mat-icon>
    </button>

    <button mat-icon-button [matMenuTriggerFor]="infoMenu" matTooltip="Open the more menu (About, Impressum, Profile, Skill Overview)" matTooltipPosition="below">
      <mat-icon>menu</mat-icon>
    </button>
    <mat-menu #infoMenu="matMenu">
      <button mat-menu-item (click)="openHelp()">
        <mat-icon>help_outline</mat-icon>
        Help
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="openAboutPopup()">
        <mat-icon>info</mat-icon>
        About
      </button>
      <button mat-menu-item (click)="openImprintPopup()">
        <mat-icon>description</mat-icon>
        Impressum
      </button>
      <button mat-menu-item (click)="openPrivacyPolicyPopup()">
        <mat-icon>privacy_tip</mat-icon>
        Privacy Policy
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="emitProfileButtonClicked()">
        <mat-icon>person</mat-icon>
        Profile
      </button>
      <button mat-menu-item (click)="emitSkillOverviewRequested()">
        <mat-icon>analytics</mat-icon>
        Skill Overview
      </button>
    </mat-menu>
  </nav>
</mat-toolbar>
