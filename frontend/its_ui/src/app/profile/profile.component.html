<div class="profile-container">
  <mat-card class="profile-card">
    <mat-card-header class="profile-header">
      <mat-card-title>User Profile</mat-card-title>
    </mat-card-header>
    
    <mat-card-content>
      <!-- User Info Section -->
      <mat-card class="user-info-card">
        <mat-card-content>
          <table class="profile-table">
            <tr>
              <th>Name</th>
              <td>{{user.username}}</td>
            </tr>
            <tr>
              <th>Registered for</th>
              <td class="multiline-text">{{enrolledCourses}}</td>
            </tr>
            <tr>
              <th>Registered since</th>
              <td>{{registeredDatetime}}</td>
            </tr>
          </table>
        </mat-card-content>
      </mat-card>

      <mat-divider class="section-divider"></mat-divider>

      <!-- Data Consent Section -->
      <div class="consent-section">
        <mat-checkbox 
          [(ngModel)]="dataCollectionConsent" 
          (change)="updateSettings()"
          color="primary">
          I consent to anonymized data collection for purely scientific purposes.
        </mat-checkbox>
        <p class="consent-info">
          <a (click)="showDataTermsPopup()">Learn more about the data we gather and its potential uses.</a>
        </p>
      </div>

      <mat-divider class="section-divider"></mat-divider>

      <!-- Action Buttons -->
      <div class="button-container">
        <button mat-stroked-button (click)="closeProfile()" class="action-button secondary-button">
          Close Profile
        </button>
        <button mat-raised-button color="primary" (click)="logout()" class="action-button">
          Logout
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
