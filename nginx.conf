#Please replace /etc/nginx/nginx.conf with this file.
user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 768;
	# multi_accept on;
}

http {

	##
	# Basic Settings
	##

	sendfile on;
	tcp_nopush on;
	types_hash_max_size 2048;
	
	# server_tokens off;

	server_names_hash_bucket_size 64;
	# server_name_in_redirect off;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	##
	# SSL Settings
	##

	ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
	ssl_prefer_server_ciphers on;

	##
	# Logging Settings
	##

	access_log /var/log/nginx/access.log;
	error_log /var/log/nginx/error.log;

	##
	# Gzip Settings
	##

	gzip on;


	##
	# Virtual Host Configs
	##

	include /etc/nginx/conf.d/*.conf;
	include /etc/nginx/sites-enabled/*;
	
        server {
                server_name its.techfak.de;
                add_header 'Content-Security-Policy' 'upgrade-insecure-requests';       

            #location / {
                #root /home/its/Documents/intelligent-tut-system/frontend/its_ui/dist/its_ui/;
                #alias /home/its/Documents/intelligent-tut-system/frontend/its_ui/dist/its_ui/;
            #}

           location / {
               proxy_set_header Host $host;
               proxy_set_header X-Real-IP $remote_addr;
               proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
               proxy_set_header X-Forwarded-Proto $scheme;
               proxy_pass http://127.0.0.1:8080;
           }


           location /api {
               proxy_set_header Host $host;
               proxy_set_header X-Real-IP $remote_addr;
               proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
               proxy_set_header X-Forwarded-Proto $scheme;
               proxy_pass http://127.0.0.1:8888;
           }




    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/its.techfak.de/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/its.techfak.de/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}




        server {
    if ($host = its.techfak.de) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


            listen 80;
                server_name its.techfak.de;
    return 404; # managed by Certbot


}}

